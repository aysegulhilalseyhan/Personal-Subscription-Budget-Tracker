<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in | Personal Subscription Budget Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel">
        <div>
          <p class="eyebrow">Personal Subscription Budget Tracker</p>
          <h1>Manage recurring payments with a clear monthly budget.</h1>
        </div>

        <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
          <button class="tab-button active" type="button" data-auth-tab="login">Login</button>
          <button class="tab-button" type="button" data-auth-tab="register">Register</button>
        </div>

        <form id="loginForm" class="auth-form">
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Login</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <label>
            Name
            <input type="text" name="name" autocomplete="name" required minlength="2" />
          </label>
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="new-password" required minlength="6" />
          </label>
          <label>
            Monthly budget limit
            <input type="number" name="monthlyBudgetLimit" min="0" step="0.01" value="0" />
          </label>
          <button class="primary-button" type="submit">Create account</button>
        </form>

        <p id="authMessage" class="form-message" role="status"></p>
      </section>
    </main>

    <script src="/auth.js"></script>
  </body>
</html>
